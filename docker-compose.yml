services:
  postgres:
    image: postgres:16-alpine
    container_name: campaign-touch-postgres
    environment:
      POSTGRES_DB: campaign_touch
      POSTGRES_USER: campaign_touch
      POSTGRES_PASSWORD: campaign_touch
    ports:
      - "5432:5432"
    volumes:
      - campaign_touch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_touch -d campaign_touch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  campaign_touch_postgres_data:
